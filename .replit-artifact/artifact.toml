kind = "web"
previewPath = "/"
title = "Spa Landing"
version = "1.0.0"
id = "artifacts/spa-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18558

[services.development]
run = "pnpm --filter @workspace/spa-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spa-landing", "run", "build" ]
publicDir = "artifacts/spa-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18558"
BASE_PATH = "/"
